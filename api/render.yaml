services:
  - type: web
    name: finanzas-api
    runtime: java
    runtimeVersion: 21.0
    buildCommand: mvn clean install -DskipTests
    startCommand: java -jar target/api-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: DATABASE_URL
        fromDatabase:
          name: finanzas-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://tu-frontend.vercel.app

databases:
  - name: finanzas-db
    databaseName: finanzas
    user: finanzas_user
    region: oregon
